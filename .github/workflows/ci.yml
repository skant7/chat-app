name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: chatapp
          POSTGRES_USER: chat
          POSTGRES_PASSWORD: chat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chat -d chatapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Build application
        run: mvn -B -DskipTests package

      - name: Start application
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/chatapp
          SPRING_DATASOURCE_USERNAME: chat
          SPRING_DATASOURCE_PASSWORD: chat
        run: |
          nohup java -jar target/chat-app-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          echo $! > app.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/ >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          cat app.log
          exit 1

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8080
          CI: true
        run: npm test

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: ignore

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then kill $(cat app.pid) || true; fi
