<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Private Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #2a2f3a;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #6c9eff;
      --mine: #1e3a5f;
      --theirs: #252a33;
      --online: #3dd68c;
      --danger: #ff8a8a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    #app { width: 100%; max-width: 960px; display: flex; flex-direction: column; height: 100vh; }
    #login {
      margin: auto;
      width: min(380px, 92vw);
      padding: 2rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    #login h1 { font-size: 1.35rem; margin: 0 0 0.35rem; }
    #login p.lead { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.25rem; line-height: 1.4; }
    #login label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    #login input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      margin-bottom: 0.85rem;
    }
    #loginActions { display: flex; gap: 0.5rem; }
    #login button, #sendBtn, #startChatBtn {
      flex: 1;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #0b1220;
      font-weight: 600;
      cursor: pointer;
    }
    #registerBtn {
      background: transparent;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
    }
    #login button:disabled, #sendBtn:disabled, #attachBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #authError {
      display: none;
      color: var(--danger);
      font-size: 0.85rem;
      margin: 0 0 0.75rem;
      line-height: 1.35;
    }
    #authError.visible { display: block; }
    #shell { display: none; flex: 1; min-height: 0; border: 1px solid var(--border); border-radius: 0; overflow: hidden; }
    @media (min-width: 700px) {
      #shell { margin: 1rem; border-radius: 12px; }
    }
    #sidebar {
      width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #sidebar header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 0.35rem 0.75rem;
    }
    #sidebar header strong { display: block; font-size: 1rem; flex: 1; }
    #sidebar header span { color: var(--muted); width: 100%; }
    #logoutBtn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      cursor: pointer;
    }
    #logoutBtn:hover { color: var(--text); }
    #newChat {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.4rem;
    }
    #newChat input {
      flex: 1;
      min-width: 0;
      padding: 0.45rem 0.55rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
    }
    #startChatBtn { width: auto; padding: 0.45rem 0.7rem; font-size: 0.8rem; flex: 0; }
    #contacts { flex: 1; overflow-y: auto; }
    .contact {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border: none;
      width: 100%;
      background: transparent;
      color: var(--text);
      text-align: left;
      font: inherit;
    }
    .contact:hover, .contact.active { background: #222733; }
    .contact .name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .contact .badge {
      margin-left: auto;
      flex-shrink: 0;
      min-width: 1.25rem;
      height: 1.25rem;
      padding: 0 0.4rem;
      border-radius: 999px;
      background: var(--accent);
      color: #0b1220;
      font-size: 0.7rem;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .contact.active .badge { opacity: 0.85; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
    }
    .dot.on { background: var(--online); }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
    #chatHeader {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      min-height: 3.2rem;
    }
    #chatHeader .peer { font-weight: 600; }
    #chatHeader .hint { color: var(--muted); font-size: 0.85rem; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .bubble {
      max-width: min(75%, 420px);
      padding: 0.55rem 0.75rem;
      border-radius: 12px;
      line-height: 1.35;
      word-wrap: break-word;
    }
    .bubble.mine { align-self: flex-end; background: var(--mine); border-bottom-right-radius: 4px; }
    .bubble.theirs { align-self: flex-start; background: var(--theirs); border-bottom-left-radius: 4px; }
    .bubble .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35rem;
    }
    .bubble.theirs .meta { justify-content: flex-start; }
    .bubble .ticks {
      font-size: 0.75rem;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--muted);
      user-select: none;
    }
    .bubble .ticks.sent { color: #8b93a7; }
    .bubble .ticks.delivered { color: #8b93a7; }
    .bubble .ticks.read { color: #53bdeb; }
    .bubble img.media {
      display: block;
      max-width: 100%;
      max-height: 280px;
      border-radius: 8px;
      margin-bottom: 0.35rem;
      cursor: pointer;
    }
    .bubble a.file-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      word-break: break-all;
    }
    .bubble a.file-link:hover { text-decoration: underline; }
    .bubble .caption { margin-top: 0.25rem; }
    #composerWrap {
      border-top: 1px solid var(--border);
      background: var(--panel);
    }
    #attachPreview {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem 0;
      font-size: 0.85rem;
      color: var(--muted);
    }
    #attachPreview.visible { display: flex; }
    #attachPreview img {
      max-height: 48px;
      max-width: 80px;
      border-radius: 6px;
      object-fit: cover;
    }
    #attachPreview .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #clearAttach {
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem 0.4rem;
    }
    #composer {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      align-items: center;
    }
    #composer input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    #attachBtn {
      width: auto;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }
    #attachBtn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    #sendBtn { width: auto; flex: 0; }
    #fileInput { display: none; }
    #emptyState {
      margin: auto;
      text-align: center;
      color: var(--muted);
      padding: 2rem;
      max-width: 280px;
      line-height: 1.45;
    }
    #uploadError {
      display: none;
      padding: 0 0.75rem 0.35rem;
      color: var(--danger);
      font-size: 0.8rem;
    }
    #uploadError.visible { display: block; }
    @media (max-width: 640px) {
      #sidebar { width: 100%; max-width: 100%; }
      #shell.chatting #sidebar { display: none; }
      #shell:not(.chatting) #main { display: none; }
    }

    #authInfo {
      display: none;
      color: var(--online);
      font-size: 0.85rem;
      margin: 0 0 0.75rem;
      line-height: 1.35;
      word-break: break-all;
    }
    #authInfo.visible { display: block; }
    #showForgotBtn, .linkish {
      display: block;
      width: 100%;
      margin-top: 0.85rem;
      padding: 0;
      border: none;
      background: none;
      color: var(--accent);
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
    }
    .secondaryBtn {
      background: transparent !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
    }
    .hintSmall { color: var(--muted); font-size: 0.8rem; margin: 0.75rem 0 0; line-height: 1.35; }
  </style>
</head>
<body>
  <div id="app">
    <div id="login">
      <h1>Private Chat</h1>
      <p class="lead">Sign in with username and password. Messages stay private between you and your peer.</p>
      <div id="authError" role="alert"></div>
      <div id="authInfo" role="status"></div>

      <div id="authPanelLogin">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Your display name" maxlength="40" autocomplete="username" />
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="At least 6 characters" maxlength="200" autocomplete="current-password" />
        <div id="loginActions">
          <button id="loginBtn" type="button">Log in</button>
          <button id="registerBtn" type="button">Register</button>
        </div>
        <button type="button" id="showForgotBtn" class="linkish">Forgot password?</button>
      </div>

      <div id="authPanelForgot" hidden>
        <label for="forgotUsername">Username</label>
        <input id="forgotUsername" type="text" placeholder="Your display name" maxlength="40" autocomplete="username" />
        <div id="loginActions">
          <button id="forgotBtn" type="button">Send reset token</button>
          <button id="backFromForgotBtn" type="button" class="secondaryBtn">Back</button>
        </div>
        <p class="hintSmall">No email in this app — the reset token is shown here when issued.</p>
      </div>

      <div id="authPanelReset" hidden>
        <label for="resetTokenInput">Reset token</label>
        <input id="resetTokenInput" type="text" placeholder="Paste reset token" maxlength="64" autocomplete="off" />
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" placeholder="At least 6 characters" maxlength="200" autocomplete="new-password" />
        <div id="loginActions">
          <button id="resetBtn" type="button">Set new password</button>
          <button id="backFromResetBtn" type="button" class="secondaryBtn">Back to login</button>
        </div>
      </div>
    </div>

    <div id="shell">
      <aside id="sidebar">
        <header>
          <strong id="meLabel"></strong>
          <button type="button" id="logoutBtn">Log out</button>
          <span id="status">Connecting…</span>
        </header>
        <div id="newChat">
          <input id="peerInput" type="text" placeholder="Message someone…" maxlength="40" />
          <button id="startChatBtn" type="button">Go</button>
        </div>
        <div id="contacts"></div>
      </aside>
      <section id="main">
        <div id="chatHeader">
          <div class="hint" id="headerHint">Select or start a conversation</div>
          <div class="peer" id="peerLabel" hidden></div>
        </div>
        <div id="messages">
          <div id="emptyState">Pick a contact or type a username to start a private conversation.</div>
        </div>
        <div id="composerWrap" hidden>
          <div id="attachPreview">
            <img id="attachThumb" alt="" hidden />
            <span class="name" id="attachName"></span>
            <button type="button" id="clearAttach" aria-label="Remove attachment">×</button>
          </div>
          <div id="uploadError"></div>
          <form id="composer">
            <input id="fileInput" type="file" accept="image/*,.pdf,.txt,audio/*,video/mp4,video/webm" />
            <button type="button" id="attachBtn" title="Attach media" aria-label="Attach media">📎</button>
            <input id="text" type="text" placeholder="Private message…" autocomplete="off" maxlength="2000" />
            <button type="submit" id="sendBtn" disabled>Send</button>
          </form>
        </div>
      </section>
    </div>
  </div>

  <script>
    const loginEl = document.getElementById('login');
    const shellEl = document.getElementById('shell');
    const meLabel = document.getElementById('meLabel');
    const statusEl = document.getElementById('status');
    const contactsEl = document.getElementById('contacts');
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const composerWrap = document.getElementById('composerWrap');
    const composer = document.getElementById('composer');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const attachPreview = document.getElementById('attachPreview');
    const attachThumb = document.getElementById('attachThumb');
    const attachName = document.getElementById('attachName');
    const uploadError = document.getElementById('uploadError');
    const peerLabel = document.getElementById('peerLabel');
    const headerHint = document.getElementById('headerHint');
    const peerInput = document.getElementById('peerInput');
    const authError = document.getElementById('authError');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    const TOKEN_KEY = 'chatAuthToken';
    const USER_KEY = 'chatAuthUser';

    let me = '';
    let authToken = '';
    let peer = null;
    let stompClient = null;
    let online = new Set();
    /** Sidebar contact usernames (unique). */
    let contacts = [];
    /** Unread inbound counts keyed by peer username (server is source of truth on refresh). */
    let unreadByPeer = {};
    /**
     * While true, STOMP SENT frames do not +1 the badge (offline catch-up replays SENT
     * messages that are already included in /api/contacts unreadCount).
     */
    let suppressLiveUnreadIncrement = false;
    let unreadResyncTimer = null;
    let pendingFile = null;

    /** Conversation history keyset pagination (server page size 50, newest first). */
    const HISTORY_PAGE_SIZE = 50;
    let historyNextBeforeId = null;
    let historyHasMore = false;
    let historyLoading = false;
    /** Conversation currently shown — ignore late responses from a prior open. */
    let historyPeer = null;

    /** Outbound messages awaiting server echo (ACK) keyed by clientMessageId. */
    const pendingOutbound = new Map();
    const ACK_BASE_MS = 3000;
    const ACK_MAX_ATTEMPTS = 8;

    function newClientMessageId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return 'c-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 12);
    }

    function clearPendingOutbound(clientMessageId) {
      if (!clientMessageId) return;
      const entry = pendingOutbound.get(clientMessageId);
      if (!entry) return;
      if (entry.timer) clearTimeout(entry.timer);
      pendingOutbound.delete(clientMessageId);
    }

    function scheduleAckWatch(clientMessageId) {
      const entry = pendingOutbound.get(clientMessageId);
      if (!entry) return;
      if (entry.timer) clearTimeout(entry.timer);
      // First wait 3s; each miss doubles: 3s, 6s, 12s, …
      const delay = ACK_BASE_MS * Math.pow(2, entry.attempt);
      entry.timer = setTimeout(() => retryOutbound(clientMessageId), delay);
    }

    function retryOutbound(clientMessageId) {
      const entry = pendingOutbound.get(clientMessageId);
      if (!entry) return;
      if (entry.attempt + 1 >= ACK_MAX_ATTEMPTS) {
        clearPendingOutbound(clientMessageId);
        showUploadError('Message not acknowledged — gave up after retries');
        return;
      }
      entry.attempt += 1;
      if (stompClient && stompClient.connected) {
        stompClient.send('/app/chat', {}, JSON.stringify(entry.payload));
      }
      scheduleAckWatch(clientMessageId);
    }

    /** Register outbound payload and start 3s ACK timer (exponential backoff on miss). */
    function trackOutbound(payload) {
      const clientMessageId = payload.clientMessageId;
      if (!clientMessageId) return;
      clearPendingOutbound(clientMessageId);
      pendingOutbound.set(clientMessageId, {
        payload,
        attempt: 0,
        timer: null
      });
      scheduleAckWatch(clientMessageId);
    }

    function ackIfMine(msg) {
      if (!msg || msg.fromUser !== me || !msg.clientMessageId) return;
      clearPendingOutbound(msg.clientMessageId);
    }

    function showAuthError(msg) {
      if (!msg) {
        authError.classList.remove('visible');
        authError.textContent = '';
        return;
      }
      authError.textContent = msg;
      authError.classList.add('visible');
    }

    function showAuthInfo(msg) {
      const el = document.getElementById('authInfo');
      if (!msg) {
        el.classList.remove('visible');
        el.textContent = '';
        return;
      }
      el.textContent = msg;
      el.classList.add('visible');
    }

    function showAuthPanel(name) {
      document.getElementById('authPanelLogin').hidden = name !== 'login';
      document.getElementById('authPanelForgot').hidden = name !== 'forgot';
      document.getElementById('authPanelReset').hidden = name !== 'reset';
      showAuthError('');
      if (name === 'login') showAuthInfo('');
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleString([], { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' });
    }

    function clearMessages() {
      messagesEl.innerHTML = '';
      messagesEl.appendChild(emptyState);
      emptyState.hidden = false;
      historyNextBeforeId = null;
      historyHasMore = false;
      historyLoading = false;
      historyPeer = null;
    }

    function showUploadError(msg) {
      if (!msg) {
        uploadError.classList.remove('visible');
        uploadError.textContent = '';
        return;
      }
      uploadError.textContent = msg;
      uploadError.classList.add('visible');
    }

    function clearAttachment() {
      pendingFile = null;
      fileInput.value = '';
      attachPreview.classList.remove('visible');
      attachThumb.hidden = true;
      attachThumb.removeAttribute('src');
      attachName.textContent = '';
      showUploadError('');
    }

    function setAttachment(file) {
      pendingFile = file;
      attachName.textContent = file.name + ' (' + Math.round(file.size / 1024) + ' KB)';
      attachPreview.classList.add('visible');
      showUploadError('');
      if (file.type && file.type.startsWith('image/')) {
        const url = URL.createObjectURL(file);
        attachThumb.src = url;
        attachThumb.hidden = false;
        attachThumb.onload = () => URL.revokeObjectURL(url);
      } else {
        attachThumb.hidden = true;
        attachThumb.removeAttribute('src');
      }
    }

    function statusRank(status) {
      const s = (status || 'SENT').toUpperCase();
      if (s === 'READ') return 2;
      if (s === 'DELIVERED') return 1;
      return 0;
    }

    function ticksForStatus(status) {
      const s = (status || 'SENT').toUpperCase();
      if (s === 'READ') return { text: '✓✓', cls: 'ticks read', title: 'Read' };
      if (s === 'DELIVERED') return { text: '✓✓', cls: 'ticks delivered', title: 'Delivered' };
      return { text: '✓', cls: 'ticks sent', title: 'Sent' };
    }

    function findBubble(msg) {
      if (msg && msg.id != null && msg.id !== '') {
        const byId = messagesEl.querySelector('[data-message-id="' + String(msg.id) + '"]');
        if (byId) return byId;
      }
      if (msg && msg.clientMessageId) {
        return messagesEl.querySelector(
          '[data-client-message-id="' + String(msg.clientMessageId).replace(/"/g, '') + '"]'
        );
      }
      return null;
    }

    function applyStatusToBubble(div, msg) {
      if (!div || !msg) return;
      if (msg.id != null) div.dataset.messageId = String(msg.id);
      if (msg.clientMessageId) div.dataset.clientMessageId = msg.clientMessageId;
      const prev = div.dataset.status || 'SENT';
      if (statusRank(msg.status) < statusRank(prev)) return;
      div.dataset.status = (msg.status || 'SENT').toUpperCase();
      const ticksEl = div.querySelector('.ticks');
      if (!ticksEl) return;
      const t = ticksForStatus(div.dataset.status);
      ticksEl.textContent = t.text;
      ticksEl.className = t.cls;
      ticksEl.title = t.title;
    }

    function reportMessageStatus(messageId, status) {
      if (!stompClient || !stompClient.connected || messageId == null) return;
      stompClient.send('/app/chat/status', {}, JSON.stringify({
        messageId: String(messageId),
        status: status
      }));
    }

    function reportMessageStatuses(messageIds, status) {
      if (!stompClient || !stompClient.connected || !messageIds || !messageIds.length) return;
      stompClient.send('/app/chat/status', {}, JSON.stringify({
        messageIds: messageIds.join(','),
        status: status
      }));
    }

    function sameUser(a, b) {
      return !!(a && b && String(a).toLowerCase() === String(b).toLowerCase());
    }

    /** Chat with this sender is selected and the browser tab is in the foreground. */
    function conversationIsActivelyViewed(fromUser) {
      return isActivePeer(fromUser) && typeof document !== 'undefined'
        && document.visibilityState === 'visible';
    }

    /**
     * Receipts from STOMP frames:
     * - DELIVERED = this device received the frame (incl. offline catch-up). Grey ✓✓.
     * - READ = message is shown in an open, visible chat. Blue ✓✓ only then.
     *
     * Important: never mark READ on mere reconnect/catch-up. Catch-up used to call
     * READ whenever {@code peer} was still set from an earlier selection, which made
     * senders see blue ticks while the recipient still had unread badges.
     */
    function handleInboundReceipts(msg) {
      if (!msg || !sameUser(msg.toUser, me) || msg.id == null) return;

      // Transport receipt → DELIVERED only (device got the bytes).
      if (statusRank(msg.status) < statusRank('DELIVERED')) {
        reportMessageStatus(msg.id, 'DELIVERED');
      }

      // Do not mark READ during offline catch-up; scheduleUnreadResync handles open chats.
      if (suppressLiveUnreadIncrement) return;

      // Live message while that conversation is open and the tab is visible → READ.
      if (conversationIsActivelyViewed(msg.fromUser)
          && statusRank(msg.status) < statusRank('READ')) {
        reportMessageStatus(msg.id, 'READ');
      }
    }

    /** Mark inbound bubbles currently painted in the open chat as READ. */
    function markVisibleInboundAsRead() {
      if (!peer || !conversationIsActivelyViewed(peer)) return;
      const ids = [];
      messagesEl.querySelectorAll('.bubble.theirs[data-message-id]').forEach((el) => {
        const id = el.dataset.messageId;
        if (!id) return;
        if (statusRank(el.dataset.status || 'SENT') < statusRank('READ')) {
          ids.push(id);
        }
      });
      if (ids.length) {
        reportMessageStatuses(ids, 'READ');
        ids.forEach((id) => {
          const el = messagesEl.querySelector('[data-message-id="' + id + '"]');
          if (el) el.dataset.status = 'READ';
        });
      }
    }

    function buildBubble(msg) {
      const mine = msg.fromUser === me;
      const div = document.createElement('div');
      div.className = 'bubble ' + (mine ? 'mine' : 'theirs');
      div.dataset.messageId = msg.id != null ? String(msg.id) : '';
      div.dataset.status = (msg.status || 'SENT').toUpperCase();
      if (msg.clientMessageId) {
        div.dataset.clientMessageId = msg.clientMessageId;
      }

      const type = (msg.messageType || 'TEXT').toUpperCase();
      if (msg.mediaUrl && (type === 'IMAGE' || (msg.mediaContentType || '').startsWith('image/'))) {
        const img = document.createElement('img');
        img.className = 'media';
        img.src = msg.mediaUrl;
        img.alt = msg.mediaFileName || 'Image';
        img.loading = 'lazy';
        img.addEventListener('click', () => window.open(msg.mediaUrl, '_blank'));
        div.appendChild(img);
      } else if (msg.mediaUrl) {
        const link = document.createElement('a');
        link.className = 'file-link';
        link.href = msg.mediaUrl;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = '📄 ' + (msg.mediaFileName || 'Download file');
        div.appendChild(link);
      }

      if (msg.text) {
        const text = document.createElement('div');
        if (msg.mediaUrl) text.className = 'caption';
        text.textContent = msg.text;
        div.appendChild(text);
      }

      const meta = document.createElement('div');
      meta.className = 'meta';
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = formatTime(msg.timestamp);
      meta.appendChild(time);
      if (mine) {
        const ticks = document.createElement('span');
        const t = ticksForStatus(msg.status);
        ticks.className = t.cls;
        ticks.textContent = t.text;
        ticks.title = t.title;
        meta.appendChild(ticks);
      }
      div.appendChild(meta);
      return div;
    }

    function appendBubble(msg, options) {
      const scroll = !options || options.scroll !== false;
      // Status / retry re-delivery: update existing bubble instead of duplicating.
      const existing = findBubble(msg);
      if (existing) {
        applyStatusToBubble(existing, msg);
        return;
      }

      emptyState.hidden = true;
      messagesEl.appendChild(buildBubble(msg));
      if (scroll) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    /**
     * Insert older history above existing bubbles, preserving scroll position
     * so the user's viewport does not jump when scrolling up.
     * Messages must be oldest → newest; duplicates (by id / clientMessageId) are skipped.
     */
    function prependBubbles(messages) {
      if (!messages || !messages.length) return;
      emptyState.hidden = true;
      const prevHeight = messagesEl.scrollHeight;
      const prevTop = messagesEl.scrollTop;
      // First real bubble after optional emptyState — insert before it.
      let anchor = emptyState.nextSibling;
      while (anchor && !anchor.classList?.contains('bubble')) {
        anchor = anchor.nextSibling;
      }
      const frag = document.createDocumentFragment();
      for (const msg of messages) {
        if (findBubble(msg)) continue;
        frag.appendChild(buildBubble(msg));
      }
      if (!frag.childNodes.length) return;
      if (anchor) {
        messagesEl.insertBefore(frag, anchor);
      } else {
        messagesEl.appendChild(frag);
      }
      messagesEl.scrollTop = prevTop + (messagesEl.scrollHeight - prevHeight);
    }

    /** History just rendered in the open chat → those inbound messages are READ. */
    function markHistoryAsRead(messages) {
      const unread = (messages || [])
        .filter(m => sameUser(m.toUser, me)
          && (m.status || 'SENT').toUpperCase() !== 'READ'
          && m.id != null)
        .map(m => m.id);
      if (unread.length) {
        reportMessageStatuses(unread, 'READ');
      }
    }

    /**
     * Normalize conversation API payload.
     * Current: { messages, nextBeforeId, hasMore }
     * Legacy (pre-pagination): bare ChatMessage[] — treat as a single full page.
     */
    function normalizeConversationPage(data) {
      if (Array.isArray(data)) {
        return { messages: data, nextBeforeId: null, hasMore: false };
      }
      if (data && typeof data === 'object') {
        const messages = Array.isArray(data.messages) ? data.messages : [];
        return {
          messages,
          nextBeforeId: data.nextBeforeId != null ? data.nextBeforeId : null,
          hasMore: !!data.hasMore
        };
      }
      return { messages: [], nextBeforeId: null, hasMore: false };
    }

    async function fetchConversationPage(peerName, beforeId) {
      let url = '/api/conversation?me=' + encodeURIComponent(me)
        + '&peer=' + encodeURIComponent(peerName)
        + '&limit=' + HISTORY_PAGE_SIZE;
      if (beforeId != null) {
        url += '&beforeId=' + encodeURIComponent(String(beforeId));
      }
      // cache: 'no-store' avoids sticky empty-chat after API shape changes
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) {
        throw new Error('Failed to load conversation (' + res.status + ')');
      }
      return normalizeConversationPage(await res.json());
    }

    async function loadOlderHistory() {
      if (!peer || !historyHasMore || historyLoading || historyNextBeforeId == null) return;
      const forPeer = peer;
      historyLoading = true;
      try {
        const page = await fetchConversationPage(forPeer, historyNextBeforeId);
        if (historyPeer !== forPeer || peer !== forPeer) return;
        const messages = page.messages || [];
        prependBubbles(messages);
        historyHasMore = !!page.hasMore;
        historyNextBeforeId = page.nextBeforeId != null ? page.nextBeforeId : null;
        markHistoryAsRead(messages);
      } catch (e) {
        console.warn(e);
      } finally {
        if (historyPeer === forPeer) historyLoading = false;
      }
    }

    messagesEl.addEventListener('scroll', () => {
      // Near the top → request the next older page.
      if (messagesEl.scrollTop < 80) {
        loadOlderHistory();
      }
    });

    function contactKey(name) {
      if (!name) return null;
      const existing = contacts.find(n => n && n.toLowerCase() === name.toLowerCase());
      return existing || name;
    }

    function ensureContact(name) {
      if (!name || name.toLowerCase() === me.toLowerCase()) return null;
      const key = contactKey(name);
      if (!contacts.some(n => n.toLowerCase() === name.toLowerCase())) {
        contacts.push(name);
        return name;
      }
      return key;
    }

    function getUnread(name) {
      if (!name) return 0;
      if (unreadByPeer[name] != null) return Number(unreadByPeer[name]) || 0;
      const key = Object.keys(unreadByPeer).find(k => k.toLowerCase() === name.toLowerCase());
      return key ? (Number(unreadByPeer[key]) || 0) : 0;
    }

    function setUnread(name, count) {
      if (!name) return;
      const n = Math.max(0, Number(count) || 0);
      // Prefer the canonical contact key so badges stay stable.
      const key = contactKey(name) || name;
      // Drop any case-variant keys.
      for (const k of Object.keys(unreadByPeer)) {
        if (k !== key && k.toLowerCase() === key.toLowerCase()) {
          delete unreadByPeer[k];
        }
      }
      if (n <= 0) {
        delete unreadByPeer[key];
      } else {
        unreadByPeer[key] = n;
      }
    }

    /**
     * Live unread badge updates from STOMP frames.
     * - Open chat with sender → count is 0 (messages are marked READ).
     * - Fresh inbound SENT while chat closed → +1 (status re-pushes use DELIVERED/READ).
     */
    function updateUnreadFromMessage(msg) {
      if (!msg || msg.toUser !== me || !msg.fromUser || msg.fromUser === me) return;
      const other = ensureContact(msg.fromUser);
      if (!other) return;
      if (peer && peer.toLowerCase() === other.toLowerCase()) {
        setUnread(other, 0);
        renderContacts();
        return;
      }
      const status = (msg.status || 'SENT').toUpperCase();
      if (status === 'READ') {
        // Message is read; do not count. Full truth refreshed via open/refresh.
        return;
      }
      // Only brand-new live deliveries start as SENT; DELIVERED/READ are status updates.
      // Skip +1 during reconnect catch-up (those SENT rows are already in server unread counts).
      if (status === 'SENT' && !suppressLiveUnreadIncrement) {
        setUnread(other, getUnread(other) + 1);
        renderContacts();
      }
    }

    /** After offline catch-up frames land, re-sync badges; if a chat is open and visible, mark those READ. */
    function scheduleUnreadResync() {
      if (unreadResyncTimer) clearTimeout(unreadResyncTimer);
      unreadResyncTimer = setTimeout(() => {
        unreadResyncTimer = null;
        suppressLiveUnreadIncrement = false;
        // Catch-up may have painted messages into an already-open, visible chat.
        markVisibleInboundAsRead();
        refreshContacts();
      }, 800);
    }

    // Tab becomes visible again with a conversation open → those messages are on screen → READ.
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        markVisibleInboundAsRead();
      }
    });

    function renderContacts() {
      contactsEl.innerHTML = '';
      const names = [...new Set(contacts)]
        .filter(n => n && n.toLowerCase() !== me.toLowerCase())
        // Unread first, then A–Z
        .sort((a, b) => {
          const ub = getUnread(b) - getUnread(a);
          if (ub !== 0) return ub;
          return a.localeCompare(b);
        });
      for (const name of names) {
        const btn = document.createElement('button');
        btn.type = 'button';
        const isActive = peer && peer.toLowerCase() === name.toLowerCase();
        btn.className = 'contact' + (isActive ? ' active' : '');
        const dot = document.createElement('span');
        const isOnline = [...online].some(o => o && o.toLowerCase() === name.toLowerCase());
        dot.className = 'dot' + (isOnline ? ' on' : '');
        const label = document.createElement('span');
        label.className = 'name';
        label.textContent = name;
        btn.appendChild(dot);
        btn.appendChild(label);
        const unread = getUnread(name);
        if (unread > 0 && !isActive) {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = unread > 99 ? '99+' : String(unread);
          badge.title = unread + ' unread';
          btn.appendChild(badge);
        }
        btn.addEventListener('click', () => openConversation(name));
        contactsEl.appendChild(btn);
      }
    }

    async function refreshContacts() {
      const res = await fetch('/api/contacts?me=' + encodeURIComponent(me), { cache: 'no-store' });
      if (!res.ok) return;
      const data = await res.json();
      const nextNames = [];
      const nextUnread = {};
      if (Array.isArray(data)) {
        for (const item of data) {
          // New shape: { username, unreadCount }; legacy: bare string
          if (typeof item === 'string') {
            if (item) nextNames.push(item);
          } else if (item && item.username) {
            nextNames.push(item.username);
            const c = Number(item.unreadCount) || 0;
            if (c > 0) nextUnread[item.username] = c;
          }
        }
      }
      contacts = nextNames;
      unreadByPeer = nextUnread;
      // Open conversation is always treated as read in the UI.
      if (peer) setUnread(peer, 0);
      renderContacts();
    }

    async function openConversation(name) {
      peer = name.trim();
      if (!peer || peer.toLowerCase() === me.toLowerCase()) return;
      ensureContact(peer);
      // Opening the chat means messages are (or will be) visible → clear badge immediately.
      setUnread(peer, 0);
      renderContacts();
      peerLabel.hidden = false;
      peerLabel.textContent = peer;
      headerHint.hidden = true;
      composerWrap.hidden = false;
      shellEl.classList.add('chatting');
      clearAttachment();
      clearMessages();
      emptyState.textContent = 'No messages yet. Say hello.';
      emptyState.hidden = false;
      historyPeer = peer;
      historyLoading = true;
      const forPeer = peer;
      try {
        // Newest page first (up to 50); scroll-up loads older via beforeId.
        const page = await fetchConversationPage(forPeer, null);
        if (historyPeer !== forPeer || peer !== forPeer) return;
        const history = page.messages || [];
        historyHasMore = !!page.hasMore;
        historyNextBeforeId = page.nextBeforeId != null ? page.nextBeforeId : null;
        if (history.length) {
          emptyState.hidden = true;
          history.forEach(msg => appendBubble(msg, { scroll: false }));
          // After layout, pin to newest (bottom). rAF avoids scrollHeight=0 races.
          requestAnimationFrame(() => {
            messagesEl.scrollTop = messagesEl.scrollHeight;
          });
          markHistoryAsRead(history);
        }
        setUnread(forPeer, 0);
        renderContacts();
      } catch (e) {
        console.warn(e);
        emptyState.textContent = 'Could not load messages.';
        emptyState.hidden = false;
      } finally {
        if (historyPeer === forPeer) historyLoading = false;
      }
      document.getElementById('text').focus();
    }

    function isActivePeer(name) {
      return sameUser(peer, name);
    }

    function maybeShowMessage(msg) {
      const involvesMe = msg.fromUser === me || msg.toUser === me;
      if (!involvesMe) return;
      const other = msg.fromUser === me ? msg.toUser : msg.fromUser;
      ensureContact(other);
      updateUnreadFromMessage(msg);
      // Always apply status updates for my outbound messages (ticks), even if another chat is open.
      if (msg.fromUser === me) {
        const bubble = findBubble(msg);
        if (bubble) {
          applyStatusToBubble(bubble, msg);
        } else if (isActivePeer(other)) {
          appendBubble(msg);
        }
        return;
      }
      if (isActivePeer(other)) {
        appendBubble(msg);
      }
      // Badge / order may have changed when chat is closed or unread cleared.
      renderContacts();
    }

    function connect() {
      stompClient = Stomp.client('ws://' + location.host + '/ws');
      stompClient.debug = () => {};
      stompClient.connect({ token: authToken }, () => {
        statusEl.textContent = 'Online';
        sendBtn.disabled = false;
        attachBtn.disabled = false;
        // Catch-up will replay SENT messages; don't double-count them on the badge.
        suppressLiveUnreadIncrement = true;
        stompClient.subscribe('/user/queue/messages', (frame) => {
          const msg = JSON.parse(frame.body);
          // Echo of our send with matching clientMessageId = ACK (clear retry timer).
          ackIfMine(msg);
          // Recipient: frame received → DELIVERED; open chat → READ.
          handleInboundReceipts(msg);
          maybeShowMessage(msg);
          // Offline catch-up may arrive as a burst of SENT frames.
          if (suppressLiveUnreadIncrement) {
            scheduleUnreadResync();
          }
        });
        stompClient.subscribe('/topic/presence', (frame) => {
          online = new Set(JSON.parse(frame.body));
          renderContacts();
        });
        // Ask server to push any messages stored while we were offline (no page reload).
        // MessageCatchupListener also flushes on SUBSCRIBE; this is an explicit safety net.
        try {
          stompClient.send('/app/catchup', {}, '{}');
        } catch (_) { /* ignore */ }
        scheduleUnreadResync();
        refreshContacts();
        fetch('/api/online').then(r => r.json()).then(list => {
          online = new Set(list);
          renderContacts();
        });
      }, () => {
        statusEl.textContent = 'Disconnected — retrying…';
        sendBtn.disabled = true;
        attachBtn.disabled = true;
        suppressLiveUnreadIncrement = true;
        setTimeout(connect, 2000);
      });
    }

    function enterApp(username, token) {
      me = username;
      authToken = token;
      sessionStorage.setItem(TOKEN_KEY, token);
      sessionStorage.setItem(USER_KEY, username);
      meLabel.textContent = me;
      loginEl.style.display = 'none';
      shellEl.style.display = 'flex';
      showAuthError('');
      connect();
    }

    async function authRequest(path) {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      showAuthError('');
      if (!username) {
        showAuthError('Username is required');
        return;
      }
      if (!password) {
        showAuthError('Password is required');
        return;
      }
      const loginBtn = document.getElementById('loginBtn');
      const registerBtn = document.getElementById('registerBtn');
      loginBtn.disabled = true;
      registerBtn.disabled = true;
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (res.status === 409 || (data.error && /already exists/i.test(data.error))) {
            showAuthError(data.error || 'User already exists');
          } else {
            showAuthError(data.error || 'Authentication failed');
          }
          return;
        }
        passwordInput.value = '';
        enterApp(data.username, data.token);
      } catch (e) {
        showAuthError('Network error — try again');
      } finally {
        loginBtn.disabled = false;
        registerBtn.disabled = false;
      }
    }

    document.getElementById('loginBtn').addEventListener('click', () => authRequest('/api/auth/login'));
    document.getElementById('registerBtn').addEventListener('click', () => authRequest('/api/auth/register'));

    document.getElementById('showForgotBtn').addEventListener('click', () => {
      document.getElementById('forgotUsername').value = usernameInput.value.trim();
      showAuthPanel('forgot');
    });
    document.getElementById('backFromForgotBtn').addEventListener('click', () => showAuthPanel('login'));
    document.getElementById('backFromResetBtn').addEventListener('click', () => showAuthPanel('login'));

    document.getElementById('forgotBtn').addEventListener('click', async () => {
      const username = document.getElementById('forgotUsername').value.trim();
      showAuthError('');
      showAuthInfo('');
      if (!username) {
        showAuthError('Username is required');
        return;
      }
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showAuthError(data.error || 'Request failed');
          return;
        }
        if (data.resetToken) {
          document.getElementById('resetTokenInput').value = data.resetToken;
          showAuthInfo('Reset token issued (copy kept below). Enter a new password.');
          showAuthPanel('reset');
          showAuthInfo('Token: ' + data.resetToken);
        } else {
          showAuthInfo(data.message || 'If that account exists, a reset token was issued.');
        }
      } catch (e) {
        showAuthError('Network error — try again');
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const token = document.getElementById('resetTokenInput').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      showAuthError('');
      showAuthInfo('');
      if (!token) {
        showAuthError('Reset token is required');
        return;
      }
      if (!newPassword || newPassword.length < 6) {
        showAuthError('Password must be at least 6 characters');
        return;
      }
      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showAuthError(data.error || 'Reset failed');
          return;
        }
        document.getElementById('newPassword').value = '';
        document.getElementById('resetTokenInput').value = '';
        passwordInput.value = '';
        showAuthPanel('login');
        showAuthInfo(data.message || 'Password updated. Log in with your new password.');
      } catch (e) {
        showAuthError('Network error — try again');
      } finally {
        btn.disabled = false;
      }
    });

    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') passwordInput.focus();
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'X-Auth-Token': authToken }
        });
      } catch (_) { /* ignore */ }
      if (stompClient) {
        try { stompClient.disconnect(() => {}); } catch (_) { /* ignore */ }
      }
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(USER_KEY);
      location.reload();
    });

    document.getElementById('startChatBtn').addEventListener('click', () => {
      const name = peerInput.value.trim();
      if (name) {
        peerInput.value = '';
        openConversation(name);
      }
    });

    peerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('startChatBtn').click();
      }
    });

    attachBtn.addEventListener('click', () => fileInput.click());
    document.getElementById('clearAttach').addEventListener('click', clearAttachment);

    fileInput.addEventListener('change', () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        showUploadError('File must be 10 MB or smaller');
        fileInput.value = '';
        return;
      }
      setAttachment(file);
    });

    async function uploadMedia(file) {
      const form = new FormData();
      form.append('file', file);
      const res = await fetch('/api/media', { method: 'POST', body: form });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || 'Upload failed');
      }
      return data;
    }

    composer.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!stompClient || !stompClient.connected || !peer) return;
      const text = document.getElementById('text').value.trim();
      const file = pendingFile;
      if (!text && !file) return;

      sendBtn.disabled = true;
      attachBtn.disabled = true;
      showUploadError('');

      try {
        const clientMessageId = newClientMessageId();
        let payload = { to: peer, text, clientMessageId };
        if (file) {
          const uploaded = await uploadMedia(file);
          payload.mediaUrl = uploaded.url;
          payload.mediaContentType = uploaded.contentType;
          payload.mediaFileName = uploaded.fileName;
          payload.messageType = uploaded.messageType;
        }
        // Same clientMessageId on retry; server will not insert another row.
        trackOutbound(payload);
        stompClient.send('/app/chat', {}, JSON.stringify(payload));
        document.getElementById('text').value = '';
        clearAttachment();
      } catch (err) {
        showUploadError(err.message || 'Failed to send media');
      } finally {
        sendBtn.disabled = false;
        attachBtn.disabled = false;
      }
    });

    // No silent restore without password — session token alone is ok only after explicit login this tab.
    // If you want "remember me", we could restore token from sessionStorage; for security we require password each full load unless token present.
    const savedToken = sessionStorage.getItem(TOKEN_KEY);
    const savedUser = sessionStorage.getItem(USER_KEY);
    if (savedToken && savedUser) {
      enterApp(savedUser, savedToken);
    }
  </script>
</body>
</html>
