server.port=8080

# Do not let browsers pin a stale index.html (breaks when API response shape changes).
spring.web.resources.cache.cachecontrol.no-store=true

spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.username=chat
spring.datasource.password=chat

# Schema changes via Flyway only (Hibernate validates entities match DB).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Schema versioning. Empty DB runs V1+; non-empty DBs without history baseline at 0.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Media uploaded to DB as bytea (see MediaAsset); multipart limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# When true, forgot-password returns resetToken in the response (no email in this app). Set false in production if you email tokens.
chat.auth.return-reset-token=true
