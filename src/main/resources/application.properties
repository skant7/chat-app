server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.username=surya
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Media uploaded to DB as bytea (see MediaAsset); multipart limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# When true, forgot-password returns resetToken in the response (no email in this app). Set false in production if you email tokens.
chat.auth.return-reset-token=true
