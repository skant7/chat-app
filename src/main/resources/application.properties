server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.username=surya
spring.datasource.password=

# Schema owned by Flyway; JPA only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Existing DBs created via Hibernate: mark V1 as applied, then run V2+
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Media uploaded to DB as bytea (see MediaAsset); multipart limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# When true, forgot-password returns resetToken in the response (no email in this app).
chat.auth.return-reset-token=true
